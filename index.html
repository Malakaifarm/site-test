<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Malakai</title>
    <style>
      html, body, #root { margin: 0; min-height: 100%; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      button { font: inherit; }
      img { max-width: 100%; }
      @media (max-width: 1024px) {
        div[style*="grid-template-columns: 1.05fr 0.95fr"],
        div[style*="grid-template-columns: 1.2fr 0.8fr"],
        div[style*="grid-template-columns: 1fr 0.9fr"],
        div[style*="grid-template-columns: 1fr 1fr"] {
          grid-template-columns: 1fr !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
